services:
  - type: web
    name: movieverse
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn movie.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: TMDB_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: movieverse-db
          property: connectionString

  - type: pserv
    name: movieverse-db
    runtime: postgresql
    plan: free
    ipAllowList: []
